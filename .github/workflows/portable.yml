name: Build portable GUI

on:
  workflow_dispatch:
  push:
    branches:
      - "feature/**"
      - develop
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "packaging/**"
      - "scripts/**"
      - "docs/usage-guide.html"
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/portable.yml"

permissions:
  contents: read

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-perforce-integration:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        shell: pwsh
        run: python -m pip install ".[dev]"
      - name: Download Perforce 2025.1 test binaries
        shell: pwsh
        run: |
          $PerforceBin = Join-Path $env:RUNNER_TEMP "perforce-bin"
          New-Item -ItemType Directory -Force -Path $PerforceBin | Out-Null
          $BaseUri = "https://ftp.perforce.com/perforce/r25.1/bin.ntx64"
          Invoke-WebRequest "$BaseUri/p4.exe" -OutFile (Join-Path $PerforceBin "p4.exe")
          Invoke-WebRequest "$BaseUri/p4d.exe" -OutFile (Join-Path $PerforceBin "p4d.exe")
          $ExpectedHashes = @{
            "p4.exe" = "75f80b4f6efa896e2089fa755089d775a657b767ed9282269b341517128e4feb"
            "p4d.exe" = "fded1128b024a9f9a7faf85701a6472927ef3ffa17d443532120470f761687b7"
          }
          foreach ($Name in $ExpectedHashes.Keys) {
            $Actual = (Get-FileHash (Join-Path $PerforceBin $Name) -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($Actual -ne $ExpectedHashes[$Name]) {
              throw "Perforce binary checksum mismatch: $Name"
            }
          }
      - name: Run live Perforce fstat integration
        shell: pwsh
        env:
          WWISE_RELOCATOR_LIVE_P4: "1"
          WWISE_RELOCATOR_TEST_P4: ${{ runner.temp }}\perforce-bin\p4.exe
          WWISE_RELOCATOR_TEST_P4D: ${{ runner.temp }}\perforce-bin\p4d.exe
          WWISE_RELOCATOR_P4_EVIDENCE: ${{ runner.temp }}\perforce-fstat-evidence.json
        run: python -m pytest -s tests/test_live_p4_server.py
      - name: Upload Perforce fstat evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: perforce-fstat-windows-evidence
          path: ${{ runner.temp }}\perforce-fstat-evidence.json
          if-no-files-found: warn
          retention-days: 14

  windows-portable:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Run tests
        shell: pwsh
        run: |
          python -m pip install ".[dev,portable]"
          python -m bandit -r src packaging scripts -q -ll
          python -m pip_audit --local --skip-editable
          python -m pytest
      - name: Build portable ZIP
        shell: pwsh
        run: ./scripts/build-portable.ps1 -SkipDependencyInstall
      - name: Smoke test portable executable
        shell: pwsh
        run: |
          $env:WWISE_RELOCATOR_SMOKE_TEST = "1"
          $env:WWISE_RELOCATOR_SMOKE_REPORT = Join-Path $env:RUNNER_TEMP "portable-smoke.txt"
          $SmokeProcess = Start-Process `
            -FilePath "./dist/WwiseOriginalsRelocator/WwiseOriginalsRelocator.exe" `
            -Wait `
            -PassThru
          $SmokeExitCode = $SmokeProcess.ExitCode
          if (Test-Path $env:WWISE_RELOCATOR_SMOKE_REPORT) {
            Get-Content $env:WWISE_RELOCATOR_SMOKE_REPORT
          }
          if ($SmokeExitCode -ne 0) {
            throw "Portable executable smoke test failed."
          }
      - name: Upload portable app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: WwiseOriginalsRelocator-windows-x64
          path: dist/WwiseOriginalsRelocator/
          if-no-files-found: error
          retention-days: 14
